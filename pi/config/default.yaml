app:
  device_name: signomat-pi
  base_data_dir: /data/signomat
  log_level: INFO
  wifi_interface: wlan0

camera:
  backend: auto
  device: null
  index: null
  fourcc: null
  width: 1280
  height: 720
  fps: 20
  rotation: 0
  codec: mp4v
  warmup_seconds: 1.0
  chunk_seconds: 600
  annotate_recording: true
  overlay_hold_seconds: 2.5
  retention_days: 14
  low_storage_stop_mb: 2048
  auto_exposure: true
  exposure_compensation: 0.0
  brightness: 0.0
  contrast: 1.0
  exposure_time_us: null
  analogue_gain: null

gps:
  provider: auto
  sample_interval_seconds: 1.0
  ring_buffer_size: 300

inference:
  enabled: true
  interval_seconds: 0.35
  save_crops: false
  save_unknown_signs: true
  thumbnail_max_edge: 480
  detector_backend: yolo
  detector_model_path: models/sign_detector_yolo11n_any_sign_ncnn_model
  detector_imgsz: 640
  classifier_backend: yolo
  classifier_model_path: models/sign_classifier_yolo11n_raw_min100_ncnn_model
  classifier_imgsz: 224
  model_verbose: false
  max_candidates: 8
  min_box_area: 900
  max_box_area_ratio: 0.12
  min_box_fill_ratio: 0.2
  min_detector_confidence: 0.6
  min_classifier_confidence: 0.75
  border_ignore_margin_px: 6
  dedupe_window_seconds: 6.0
  dedupe_iou_threshold: 0.25
  preprocessing:
    downscale_width: 960
    color_normalization: true
    contrast_normalization: true

api:
  host: 0.0.0.0
  port: 8080
  preview_fps: 5.0
  preview_jpeg_quality: 70
  preview_max_width: 960

sync:
  enabled: false
  batch_size: 25
  base_url: null
  ingest_token: null
  device_id: signomat-pi
  interval_seconds: 60.0
  request_timeout_seconds: 15.0

ble:
  enabled: false
  mode: mock
  adapter: hci0
  advertise_name: null
  discoverable: true
  pairable: false
  refresh_interval_seconds: 1.0

mock:
  enabled: false
  gps_seed_lat: 40.7128
  gps_seed_lon: -74.0060
  moving_speed_mps: 12.0
  frame_text_overlay: true

taxonomy:
  config_path: pi/config/taxonomy.yaml
